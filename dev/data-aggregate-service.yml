route-config:
  routes:
    - objectName: USER_OBJECT
      serviceName: elearning-service
      endPoint: '/elearning/internal/users/{id}'
      method: GET
      description: Return user info by user id

    - objectName: TOEIC_TEST_OBJECT
      serviceName: elearning-service
      endPoint: '/elearning/internal/tests/{id}'
      method: GET
      description: Return TOEIC test overview by id

    - objectName: VOCAB_WORD_OBJECT
      serviceName: elearning-service
      endPoint: '/elearning/internal/vocabularies/{id}'
      method: GET
      description: Return vocabulary word by id

    - objectName: VOCAB_CATEGORY_OBJECT
      serviceName: elearning-service
      endPoint: '/elearning/internal/vocab-categories/{id}'
      method: GET
      description: Return vocabulary category by id

    - objectName: GRAMMAR_LESSON_OBJECT
      serviceName: elearning-service
      endPoint: '/elearning/internal/grammar-lessons/{id}'
      method: GET
      description: Return grammar lesson name and category by id