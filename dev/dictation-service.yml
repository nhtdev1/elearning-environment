server:
  servlet:
    context-path: /dictation
  port: ${PORT:8387}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/elearning_dictation
    username: postgres
    password: X@x123987654
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: dictation-dev-pool
      maximum-pool-size: 30
      max-lifetime: 1800000
      idle-timeout: 300000
      connection-timeout: 30000
      minimum-idle: 3
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
